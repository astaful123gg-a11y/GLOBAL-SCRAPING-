use_default_settings: true

general:
  debug: false
  instance_name: "SHUVO AI Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "change-this-to-a-random-secret-string"
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true

# Engines that work well without API keys - Google, Bing, DuckDuckGo etc
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: youtube
    engine: youtube_noapi
    shortcut: yt
    disabled: false
